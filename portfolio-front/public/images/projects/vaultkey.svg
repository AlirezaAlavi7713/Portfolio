<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f18"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6aff"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6aff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7c6aff;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#7c6aff" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#bg)"/>

  <!-- Glow blob -->
  <ellipse cx="400" cy="240" rx="200" ry="160" fill="#7c6aff" opacity="0.08" filter="url(#blur)"/>

  <!-- Grid lines -->
  <g stroke="#7c6aff" stroke-width="0.5" opacity="0.07">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="133" y1="0" x2="133" y2="480"/>
    <line x1="266" y1="0" x2="266" y2="480"/>
    <line x1="400" y1="0" x2="400" y2="480"/>
    <line x1="533" y1="0" x2="533" y2="480"/>
    <line x1="666" y1="0" x2="666" y2="480"/>
  </g>

  <!-- Shield shape -->
  <path d="M400 100 L480 135 L480 220 Q480 290 400 330 Q320 290 320 220 L320 135 Z"
        fill="url(#accent)" opacity="0.15" filter="url(#shadow)"/>
  <path d="M400 108 L472 140 L472 220 Q472 283 400 320 Q328 283 328 220 L328 140 Z"
        fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.8"/>

  <!-- Lock body -->
  <rect x="373" y="218" width="54" height="42" rx="7" fill="url(#accent)" opacity="0.9"/>
  <!-- Lock shackle -->
  <path d="M382 218 L382 205 Q382 190 400 190 Q418 190 418 205 L418 218"
        fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <!-- Lock keyhole -->
  <circle cx="400" cy="234" r="5" fill="#0f0f18"/>
  <rect x="397" y="234" width="6" height="10" rx="2" fill="#0f0f18"/>

  <!-- Brand name -->
  <text x="400" y="378" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
        font-size="38" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">
    VaultKey
  </text>

  <!-- Subtitle -->
  <text x="400" y="408" font-family="'SF Pro Text', 'Segoe UI', system-ui, sans-serif"
        font-size="14" font-weight="400" fill="#a78bfa" text-anchor="middle" letter-spacing="3">
    GESTIONNAIRE DE MOTS DE PASSE
  </text>

  <!-- Tech pills -->
  <g font-family="'SF Pro Text', 'Segoe UI', monospace" font-size="11" font-weight="600">
    <!-- React -->
    <rect x="186" y="440" width="64" height="24" rx="12" fill="#7c6aff" opacity="0.15"/>
    <rect x="186" y="440" width="64" height="24" rx="12" fill="none" stroke="#7c6aff" stroke-width="1" opacity="0.4"/>
    <text x="218" y="457" fill="#a78bfa" text-anchor="middle">React</text>

    <!-- Node.js -->
    <rect x="262" y="440" width="68" height="24" rx="12" fill="#7c6aff" opacity="0.15"/>
    <rect x="262" y="440" width="68" height="24" rx="12" fill="none" stroke="#7c6aff" stroke-width="1" opacity="0.4"/>
    <text x="296" y="457" fill="#a78bfa" text-anchor="middle">Node.js</text>

    <!-- AES-256 -->
    <rect x="342" y="440" width="74" height="24" rx="12" fill="#7c6aff" opacity="0.15"/>
    <rect x="342" y="440" width="74" height="24" rx="12" fill="none" stroke="#7c6aff" stroke-width="1" opacity="0.4"/>
    <text x="379" y="457" fill="#a78bfa" text-anchor="middle">AES-256</text>

    <!-- 2FA -->
    <rect x="428" y="440" width="52" height="24" rx="12" fill="#7c6aff" opacity="0.15"/>
    <rect x="428" y="440" width="52" height="24" rx="12" fill="none" stroke="#7c6aff" stroke-width="1" opacity="0.4"/>
    <text x="454" y="457" fill="#a78bfa" text-anchor="middle">2FA</text>

    <!-- MySQL -->
    <rect x="492" y="440" width="62" height="24" rx="12" fill="#7c6aff" opacity="0.15"/>
    <rect x="492" y="440" width="62" height="24" rx="12" fill="none" stroke="#7c6aff" stroke-width="1" opacity="0.4"/>
    <text x="523" y="457" fill="#a78bfa" text-anchor="middle">MySQL</text>
  </g>

  <!-- Corner dots -->
  <circle cx="32" cy="32" r="2" fill="#7c6aff" opacity="0.4"/>
  <circle cx="768" cy="32" r="2" fill="#7c6aff" opacity="0.4"/>
  <circle cx="32" cy="448" r="2" fill="#7c6aff" opacity="0.4"/>
  <circle cx="768" cy="448" r="2" fill="#7c6aff" opacity="0.4"/>
</svg>
